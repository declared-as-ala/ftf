# FTF — développement / démo.
# MongoDB tourne en replica set mono-nœud : REQUIS pour les transactions MongoDB
# (finalisation de match). Pas d'authentification Mongo en dev (le port n'est exposé
# que localement) — en production, utilisez MongoDB Atlas ou un replica set avec
# authentification (keyFile) et ne publiez jamais le port 27017.
#
# Secrets : aucune valeur en dur. Créez un fichier .env à côté de ce fichier
# (ou exportez les variables) avec au minimum NEXTAUTH_SECRET.

services:
  mongodb:
    image: mongo:7.0
    container_name: ftf-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      # Initialise le replica set au premier démarrage, puis vérifie son état.
      test: >
        mongosh --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }"
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 15s
    networks:
      - ftf-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftf-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/ftf?replicaSet=rs0}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET manquant — définissez-le dans un fichier .env}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ftf-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  uploads_data:
    driver: local

networks:
  ftf-network:
    driver: bridge
